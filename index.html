<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TITAN v23 [OMEGA] - Work/Safe</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Inter, sans-serif; }
code { font-family: "JetBrains Mono", monospace; }
</style>
</head>

<body class="bg-black text-gray-300 min-h-screen flex flex-col">

<header class="p-6 border-b border-gray-800 flex justify-between items-center">
  <h1 class="text-3xl font-extrabold text-white">
    TITAN <span class="text-pink-400">v23</span>
  </h1>
  <div class="text-sm text-green-400">OMEGA WORK SAFE</div>
</header>

<div class="p-6 flex gap-4 border-b border-gray-800">
  <button id="copyBtn" class="px-4 py-2 bg-pink-600 text-white rounded">
    Copiar Script
  </button>
  <button id="downloadBtn" class="px-4 py-2 bg-gray-800 border border-gray-700 rounded">
    Descargar .ps1
  </button>
</div>

<div class="flex-1 overflow-auto p-6">
<pre class="bg-[#0a0a0a] p-6 rounded text-sm leading-relaxed"><code id="codeBlock"></code></pre>
</div>

<script>
const RAW_SCRIPT = `#Requires -RunAsAdministrator
#Requires -Version 5.1

<#
.SYNOPSIS
  TITAN v23 [OMEGA] - Optimización MAX WORK/SAFE para Windows 11
.DESCRIPTION
  Perfil conservador, reversible y auditable.
#>

[CmdletBinding(SupportsShouldProcess=$true)]
param(
  [switch]$IncludePrefetch,
  [switch]$IncludeBrowserCaches,
  [switch]$SilentMSI,
  [switch]$EnableProWU
)

$ErrorActionPreference = "Stop"

function Write-Section([string]$t){
  Write-Host ""
  Write-Host ("="*60) -ForegroundColor DarkGray
  Write-Host ("[ "+$t+" ]") -ForegroundColor Cyan
  Write-Host ("="*60) -ForegroundColor DarkGray
}

function Assert-Windows11 {
  $build=[Environment]::OSVersion.Version.Build
  if($build -lt 22000){
    Write-Host "No es Windows 11" -ForegroundColor Yellow
  } else {
    Write-Host "Windows 11 detectado ($build)" -ForegroundColor Green
  }
}

Write-Host "Iniciando TITAN v23 OMEGA..."
Assert-Windows11

$TitanDir = Join-Path $env:SystemDrive "TITAN_v23_WorkSafe"
New-Item -ItemType Directory -Path $TitanDir -Force | Out-Null

Write-Section "LIMPIEZA SAFE"

Remove-Item "$env:TEMP\\*" -Recurse -Force -ErrorAction SilentlyContinue
Remove-Item "$env:SystemRoot\\Temp\\*" -Recurse -Force -ErrorAction SilentlyContinue

Stop-Service wuauserv -Force -ErrorAction SilentlyContinue
Stop-Service bits -Force -ErrorAction SilentlyContinue
Remove-Item "$env:WINDIR\\SoftwareDistribution\\Download\\*" -Recurse -Force -ErrorAction SilentlyContinue
Start-Service bits -ErrorAction SilentlyContinue
Start-Service wuauserv -ErrorAction SilentlyContinue

Write-Host "Cleanup completado." -ForegroundColor Green

Write-Section "SERVICIOS WORK SAFE"

$disable=@("XblAuthManager","XblGameSave","XboxNetApiSvc")
foreach($s in $disable){
  if(Get-Service -Name $s -ErrorAction SilentlyContinue){
    Set-Service -Name $s -StartupType Disabled
    Stop-Service -Name $s -Force
    Write-Host "Disabled $s"
  }
}

Write-Host "TITAN v23 finalizado."
`;

document.getElementById("codeBlock").textContent = RAW_SCRIPT;

document.getElementById("copyBtn").onclick = async () => {
  await navigator.clipboard.writeText(RAW_SCRIPT);
  alert("Script copiado.");
};

document.getElementById("downloadBtn").onclick = () => {
  const blob = new Blob([RAW_SCRIPT], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "TITAN_v23_Omega_Work_W11.ps1";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};
</script>

</body>
</html>
